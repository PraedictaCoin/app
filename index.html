<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRAEDICTA • Working</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c10;
            color: #e2e8f0;
            font-family: system-ui, sans-serif;
            padding: 20px;
        }
        .gate {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0c10;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .gate-card {
            background: #11151c;
            border: 2px solid #2dd4bf;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }
        .btn {
            background: #2dd4bf;
            color: #0a0c10;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 16px;
        }
        .main-app { display: none; max-width: 1200px; margin: 0 auto; }
        .card {
            background: #11151c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #1f2a30;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #0a0f14;
            border: 1px solid #1f2a30;
            border-radius: 12px;
            color: white;
        }
        .predictions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .prediction-card {
            background: #0a0f14;
            border-radius: 16px;
            padding: 16px;
            border-left: 4px solid #2dd4bf;
        }
        .action-buttons { display: flex; gap: 8px; margin-top: 12px; }
        button { cursor: pointer; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2dd4bf;
            color: #0a0c10;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 2000;
        }
    </style>
</head>
<body>

<!-- GATE -->
<div id="gate" class="gate">
    <div class="gate-card">
        <h1>PRAEDICTA</h1>
        <p>for those who see</p>
        <button id="connectBtn" class="btn">👻 Connect Phantom</button>
        <div id="gateMessage" style="margin-top: 16px; color: #8ba3af;"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="main-app">
    <div class="card">
        <h2>✨ Create New Praediction</h2>
        <input type="text" id="title" placeholder="Title">
        <textarea id="description" rows="2" placeholder="Description"></textarea>
        <select id="category">
            <option value="crypto">Crypto</option>
            <option value="sports">Sports</option>
            <option value="politics">Politics</option>
            <option value="weather">Weather</option>
            <option value="wildcard">Wildcard</option>
        </select>
        <input type="datetime-local" id="resolutionDate">
        <button id="createBtn" class="btn" style="width:100%;">✨ Create</button>
    </div>
    <div class="card">
        <h2>📊 Active Praedictions</h2>
        <div id="predictionsContainer" class="predictions-grid"></div>
    </div>
    <div class="card">
        <h2>🏆 Leaderboard</h2>
        <div id="leaderboardContainer"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// PRAEDICTA - FIXED REDECLARATION ERROR
// ============================================================
const SUPABASE_URL = "https://klgwyaeqnklydlqatzys.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OL32s1-muu_5d5ACQ_4kVQ_yEEeyJl1";
// Use a different variable name to avoid conflict with global supabase
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let walletAddress = null;

// Helper: show toast
function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Helper: UTC day key
function getUTCDayKey() { return new Date().toISOString().slice(0,10); }

// ---------- DATABASE OPERATIONS ----------
async function loadPredictions() {
    const { data, error } = await supabaseClient
        .from('predictions')
        .select('*')
        .order('created_at', { ascending: false });
    if (error) {
        console.error(error);
        showToast("Error loading predictions");
        return [];
    }
    return data;
}

async function loadUser(address) {
    const { data, error } = await supabaseClient
        .from('users')
        .select('*')
        .eq('address', address)
        .maybeSingle();
    if (error && error.code !== 'PGRST116') console.error(error);
    return data;
}

async function upsertUser(user) {
    const { error } = await supabaseClient
        .from('users')
        .upsert(user, { onConflict: 'address' });
    if (error) console.error(error);
}

async function createPrediction(pred) {
    const { error } = await supabaseClient
        .from('predictions')
        .insert(pred);
    if (error) {
        console.error(error);
        showToast("Create failed: " + error.message);
        return false;
    }
    return true;
}

// ---------- RENDER ----------
async function renderPredictions() {
    const predictions = await loadPredictions();
    const container = document.getElementById('predictionsContainer');
    if (!container) return;
    if (predictions.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px;">No praedictions yet. Create one!</div>';
        return;
    }
    container.innerHTML = predictions.map(p => `
        <div class="prediction-card">
            <div><strong>${escapeHtml(p.title)}</strong> <span style="font-size:0.7rem;">(${p.category})</span></div>
            <div style="font-size:0.8rem;">${escapeHtml(p.description)}</div>
            <div style="font-size:0.7rem; color:#8ba3af;">Deadline: ${p.resolution_date ? new Date(p.resolution_date).toLocaleString() : 'N/A'}</div>
            <div style="display:flex; justify-content:space-between; margin-top:8px;">
                <span>👁️ YES: ${p.betting_pool_yes || 0}</span>
                <span>👁️ NO: ${p.betting_pool_no || 0}</span>
            </div>
            <div class="action-buttons">
                <button class="btn-praedict" data-id="${p.id}" data-outcome="yes">👁️ Praedict YES</button>
                <button class="btn-praedict" data-id="${p.id}" data-outcome="no">👁️ Praedict NO</button>
            </div>
        </div>
    `).join('');
    // Attach event listeners to buttons
    document.querySelectorAll('.btn-praedict').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = btn.dataset.id;
            const outcome = btn.dataset.outcome;
            praedict(id, outcome);
        });
    });
}

async function renderLeaderboard() {
    const { data, error } = await supabaseClient
        .from('users')
        .select('address, seerscore')
        .order('seerscore', { ascending: false })
        .limit(10);
    if (error) {
        console.error(error);
        return;
    }
    const container = document.getElementById('leaderboardContainer');
    if (!container) return;
    if (data.length === 0) {
        container.innerHTML = '<div>No users yet</div>';
        return;
    }
    container.innerHTML = data.map((u, i) => `
        <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #1f2a30;">
            <div>${i+1}. ${u.address.slice(0,6)}...${u.address.slice(-4)}</div>
            <div>⭐ ${u.seerscore} pts</div>
        </div>
    `).join('');
}

// ---------- ACTIONS ----------
async function praedict(id, outcome) {
    if (!walletAddress) { showToast("Connect wallet first"); return; }
    // Get current prediction
    const predictions = await loadPredictions();
    const market = predictions.find(p => p.id === id);
    if (!market || market.status !== 'active') { showToast("Not active"); return; }
    // Check if user already praedicted
    if (market.bets && market.bets.some(b => b.user === walletAddress)) {
        showToast("You already praedicted on this!");
        return;
    }
    // Check daily votes
    let user = await loadUser(walletAddress);
    const today = getUTCDayKey();
    if (!user) {
        user = { address: walletAddress, votes_left: 7, last_vote_day: today, seerscore: 0 };
    }
    if (user.last_vote_day !== today) {
        user.votes_left = 7;
        user.last_vote_day = today;
    }
    if (user.votes_left <= 0) { showToast("No votes left today!"); return; }
    user.votes_left--;
    await upsertUser(user);
    // Update prediction
    const bets = market.bets || [];
    bets.push({ user: walletAddress, outcome, amount: 1, timestamp: new Date().toISOString() });
    const bettingPoolYes = (market.betting_pool_yes || 0) + (outcome === 'yes' ? 1 : 0);
    const bettingPoolNo = (market.betting_pool_no || 0) + (outcome === 'no' ? 1 : 0);
    const { error } = await supabaseClient
        .from('predictions')
        .update({ bets, betting_pool_yes: bettingPoolYes, betting_pool_no: bettingPoolNo })
        .eq('id', id);
    if (error) { showToast("Error: " + error.message); return; }
    showToast(`👁️ Praedicted ${outcome.toUpperCase()}! (1 vote used)`);
    await renderPredictions();
    await renderLeaderboard();
}

// ---------- CREATE PREDICTION ----------
async function createNewPrediction() {
    if (!walletAddress) { showToast("Connect wallet first"); return; }
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const category = document.getElementById('category').value;
    const resolutionDate = document.getElementById('resolutionDate').value;
    if (!title || !description || !resolutionDate) { showToast("Fill all fields"); return; }
    // Check daily creation limit
    let user = await loadUser(walletAddress);
    const today = getUTCDayKey();
    if (!user) {
        user = { address: walletAddress, creations_today: 0, last_create_day: today };
    }
    if (user.last_create_day !== today) {
        user.creations_today = 0;
        user.last_create_day = today;
    }
    if (user.creations_today >= 7) { showToast("Max 7 creations per day"); return; }
    // Check active limit
    const predictions = await loadPredictions();
    const activeCount = predictions.filter(p => p.creator === walletAddress && p.status === 'active').length;
    if (activeCount >= 5) { showToast("Max 5 active praedictions"); return; }
    // Check duplicate title
    if (predictions.some(p => p.status === 'active' && p.title.toLowerCase() === title.toLowerCase())) {
        showToast("Identical active praediction exists");
        return;
    }
    // Check min resolution date (24h)
    const minDate = new Date(); minDate.setHours(minDate.getHours() + 24);
    const selected = new Date(resolutionDate);
    if (selected < minDate) { showToast("Resolution date must be at least 24h from now"); return; }
    // Increment creations
    user.creations_today++;
    await upsertUser(user);
    // Create prediction
    const newPred = {
        id: "pred_" + Date.now(),
        title, description, category,
        creator: walletAddress,
        created_at: new Date().toISOString(),
        resolution_date: resolutionDate,
        status: 'active',
        betting_pool_yes: 0,
        betting_pool_no: 0,
        bets: [],
        oracle_votes_yes: 0,
        oracle_votes_no: 0,
        oracle_voters: [],
        resolution_threshold: 0.66,
        resolved_outcome: null,
        resolved_at: null,
        dispute_deadline: null,
        dispute: { active: false }
    };
    const success = await createPrediction(newPred);
    if (success) {
        showToast("✨ Praediction created!");
        document.getElementById('title').value = "";
        document.getElementById('description').value = "";
        document.getElementById('resolutionDate').value = "";
        await renderPredictions();
        await renderLeaderboard();
    }
}

// ---------- WALLET CONNECTION ----------
async function connectWallet() {
    const gateMessage = document.getElementById('gateMessage');
    gateMessage.innerText = "Connecting...";
    if (!window.solana || !window.solana.isPhantom) {
        gateMessage.innerText = "Phantom not detected. Please install Phantom Wallet.";
        return;
    }
    try {
        const resp = await window.solana.connect();
        walletAddress = resp.publicKey.toString();
        gateMessage.innerText = "Connected! Loading...";
        // Ensure user exists in DB
        let user = await loadUser(walletAddress);
        if (!user) {
            await upsertUser({
                address: walletAddress,
                seerscore: 0,
                creations_today: 0,
                last_create_day: getUTCDayKey(),
                votes_left: 7,
                last_vote_day: getUTCDayKey()
            });
        }
        // Hide gate, show app
        document.getElementById('gate').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        await renderPredictions();
        await renderLeaderboard();
    } catch (err) {
        gateMessage.innerText = "Connection failed: " + err.message;
    }
}

// ---------- INIT ----------
document.getElementById('connectBtn').addEventListener('click', connectWallet);
document.getElementById('createBtn').addEventListener('click', createNewPrediction);

// Auto connect if already connected
if (window.solana?.isConnected && window.solana?.publicKey) {
    connectWallet();
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' })[m]);
}
</script>
</body>
</html>
